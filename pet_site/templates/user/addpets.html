<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>add pets</title>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="{% static 'addpets.css' %}">
</head>

<body>

    <nav class="navbar navbar-expand-sm bg-dark fixed-top">
        <div class="container-fluid">
            <!-- <img src="../../static/cruisegear2br.png" style="width: 165px; height: 140px;" alt=""> -->
            <h3 class="text-white">add pets</h3>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapsibleNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="collapsibleNavbar">
                <ul class="navbar-nav ms-auto me-5">
                    <li class="nav-item">
                        <a class="nav-link text-white" href="user_home">HOME</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="logout">LOGOUT</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <h2>Add Pet</h2>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <label for="category">Pet Category:</label>
    <select name="category" id="category" required>
        {% for category in categories %}
            <option value="{{ category.id }}">{{ category.name }}</option>
        {% endfor %}
    </select>
    <br>

    <label for="pet_type">Pet Type:</label>
    <select name="pet_type" id="pet_type" required>
        {% for pet_type in pet_types %}
            <option value="{{ pet_type.id }}">{{ pet_type.name }}</option>
        {% endfor %}
    </select>
    <br>

    <label for="name">Pet Name:</label>
    <input type="text" name="name" id="name" required>
    <br>

    <label for="description">Pet Description:</label>
    <textarea name="description" id="description" rows="4" cols="40" required></textarea>
    <br>

    <label for="age">Pet Age (in years):</label>
    <input type="number" name="age" id="age" required>
    <br>

    <label for="breed">Pet Breed:</label>
    <input type="text" name="breed" id="breed" required>
    <br>

    <label for="image">Pet Image:</label>
    <input type="file" name="image" id="image" required>
    <br>

    <button type="submit">Add Pet</button>
</form>


</body>

</html>
