<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ pet.pet_name }} Details</title>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="{% static 'petdetails.css' %}">
  
</head>
<body>
    <div class="container">
        <h1>{{ pet.pet_name }} Details</h1>

        <div class="pet-detail">
            <img src="{{ pet.pet_image.url }}" alt="{{ pet.pet_name }}" class="pet-image">
            <div class="pet-info">
                <p><strong>Breed:</strong> {{ pet.pet_breed }}</p>
                <p><strong>Age:</strong> {{ pet.pet_age }} years</p>
                <p><strong>Description:</strong> {{ pet.pet_description }}</p>
                <p><strong>Price:</strong> ₹{{ pet.pet_price }}</p>
                <p><strong>Category:</strong> {{ pet.category.name }}</p>
                <p><strong>Pet Type:</strong> {{ pet.pet_type.name }}</p>
            </div>
            <a href="{% url 'pet_list' %}" class="btn">Back to Pet List</a>
        </div>
    </div>
</body>
</html>
