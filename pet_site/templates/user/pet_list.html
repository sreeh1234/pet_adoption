<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Pets</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 80%;
            margin: auto;
            padding: 2rem;
            background-color: #fff;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 2rem;
        }

        .pet-list {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            justify-items: center;
        }

        .pet-card {
            background-color: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .pet-card:hover {
            transform: scale(1.05);
        }

        .pet-image img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .pet-info {
            padding: 1rem;
        }

        .pet-info h3 {
            margin: 0;
            font-size: 1.5rem;
            color: #333;
        }

        .pet-info p {
            font-size: 1rem;
            color: #666;
            margin: 10px 0;
        }

        .pet-info span {
            font-weight: bold;
        }

        .btn {
            padding: 0.5rem 1rem;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            margin-top: 1rem;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        .delete-btn {
            background-color: #dc3545;
            margin-top: 0.5rem;
        }

        .delete-btn:hover {
            background-color: #c82333;
        }

        .no-pets-message {
            text-align: center;
            font-size: 1.2rem;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>All Pets</h1>

        {% if pets %}
            <div class="pet-list">
                {% for pet in pets %}
                    <div class="pet-card">
                        <div class="pet-image">
                            <img src="{{ pet.pet_image.url }}" alt="{{ pet.pet_name }}">
                        </div>
                        <div class="pet-info">
                            <h3>{{ pet.pet_name }}</h3>
                            <p><span>Breed:</span> {{ pet.pet_breed }}</p>
                            <p><span>Age:</span> {{ pet.pet_age }} years</p>
                            <p><span>Description:</span> {{ pet.pet_description|truncatewords:20 }}</p>
                        </div>
                        <a href="{% url 'pet_detail' pet.id %}" class="btn">View Details</a>
                        
                        <form method="POST" action="{% url 'delete_pet' pet.id %}" style="display:inline;">
                            {% csrf_token %}
                            <button type="submit" class="delete-btn">Delete</button>
                        </form>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <p class="no-pets-message">No pets found in the database.</p>
        {% endif %}
    </div>

</body>
</html>
